<ion-content class="login-content">
  <div class="login-wrapper">

    <div class="login-header">
      <div class="logo-circle">
        <span class="logo-emoji">🌿</span>
      </div>
      <h1>GlowCare</h1>
      <p class="tagline">✨ Cantik dari dalam & luar ✨</p>
    </div>

    <div class="login-form">
      <div class="form-label">Siapa Nama Kamu?</div>
      <ion-item lines="none" class="input-item">
        <ion-icon name="person-outline" slot="start" class="input-icon"></ion-icon>
        <ion-input type="text" placeholder="Masukkan nama panggilanmu" [(ngModel)]="username" class="input-text"></ion-input>
      </ion-item>
      <p class="error-text" *ngIf="nameError">{{ nameError }}</p>

      <ion-button expand="block" class="login-btn" (click)="login()">
        Masuk Sekarang
      </ion-button>

      <p class="footer-text">
        Dengan masuk, kamu setuju dengan <span class="link">Syarat & Ketentuan</span> kami
      </p>
    </div>

  </div>
</ion-content>
